name: Unit Tests

on:
  push:
    branches:
      - main
      - daccollector-main
  pull_request:
    branches:
      - main
      - daccollector-main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run unit tests
        run: dotnet test DaCollector.Tests/DaCollector.Tests.csproj -c Release --logger "console;verbosity=normal"
