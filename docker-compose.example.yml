# Copy this file to your deployment folder and edit it for your server.

services:
  dacollector:
    image: ghcr.io/iranman/dacollector:latest
    shm_size: 256m
    container_name: dacollector
    restart: unless-stopped

    ports:
      - "8111:8111"

    environment:
      # Replace PUID and PGID with the user and group that should own DaCollector files.
      PUID: "1000"
      PGID: "1000"
      UMASK: "002"
      TZ: Etc/UTC
      DACOLLECTOR_HOME: /home/dacollector/.dacollector/DaCollector

      # Plex target. Use host.docker.internal when Plex runs on the Docker host.
      PLEX_TARGET_BASE_URL: http://host.docker.internal:32400
      PLEX_TARGET_SECTION_KEY: ""
      PLEX_TARGET_TOKEN: ""

      # Metadata providers.
      TMDB_API_KEY: ""
      IMDB_DATASET_PATH: ""
      IMDB_CACHE_EXPIRATION_DAYS: "7"
      TVDB_API_KEY: ""
      TVDB_PIN: ""
      TVDB_CACHE_EXPIRATION_DAYS: "7"

    volumes:
      # Persistent DaCollector settings, SQLite databases, logs, Web UI data, and provider cache.
      - dacollector-data:/home/dacollector/.dacollector

      # Windows examples.
      # - "D:/Media/Movies:/media/movies:ro"
      # - "D:/Media/TV:/media/tv:ro"
      # - "D:/Media/IMDb:/metadata/imdb:ro"

      # Linux examples.
      # - "/mnt/media/movies:/media/movies:ro"
      # - "/mnt/media/tv:/media/tv:ro"
      # - "/mnt/media/imdb:/metadata/imdb:ro"

      # If you want DaCollector duplicate deletion to remove files, change only the
      # reviewed target mount from :ro to :rw after checking the cleanup plan.

    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  dacollector-data:
