# DaCollector - annotated reference compose file
#
# This file documents every option. For a working install, use docker-compose.yml
# and edit values directly in that file.
#
# To use this file as your install base:
#   cp docker-compose.example.yml docker-compose.yml
#   nano docker-compose.yml   # fill in your values
#   docker compose up -d
#
# For a source build that bundles the React Web UI, clone DaCollector and
# DaCollector-WebUI next to each other and run `docker compose up -d --build`
# from the DaCollector repo so compose.yaml is used.

services:
  dacollector:
    image: "ghcr.io/iranman/dacollector:latest"
    container_name: dacollector
    restart: unless-stopped

    ports:
      # HOST_PORT:CONTAINER_PORT - change the left side only if 38111 is taken.
      - "38111:38111"

    environment:
      # UID / GID the server process runs as. Set to the owner of your media folders.
      # Run: id <your-media-user>  on the host to find the right values.
      # On TrueNAS, set these to the UID/GID of the ZFS dataset owner.
      PUID: "1000"
      PGID: "1000"
      UMASK: "002"

      # Full timezone name. Example: America/New_York
      TZ: "Etc/UTC"

      # Internal data directory. Do not change unless you understand the implications.
      DACOLLECTOR_HOME: /home/dacollector/.dacollector/DaCollector

      # Set to "true" on TrueNAS/ZFS or ACL-managed datasets to skip recursive chown on startup.
      # Without this a first-boot ownership repair can stall on large ZFS pools for several minutes.
      # Only enable this if the mounted data directory is already writable by PUID/PGID.
      SKIP_CHOWN: "false"

      # URL of your Plex Media Server.
      # Same machine as Docker:   http://host.docker.internal:32400
      # Different machine on LAN: http://192.168.1.50:32400
      PLEX_TARGET_BASE_URL: "http://host.docker.internal:32400"

      # Plex library section key (numeric). Get it from:
      # http://<plex-host>:32400/library/sections?X-Plex-Token=<token>
      PLEX_TARGET_SECTION_KEY: ""

      # Plex API token. Find it in Plex Web: open any item → three-dot → Get Info → URL bar.
      PLEX_TARGET_TOKEN: ""

      # TMDB - free key from https://www.themoviedb.org/settings/api
      TMDB_API_KEY: ""

      # TVDB - key from https://thetvdb.com/dashboard/account/apikeys
      TVDB_API_KEY: ""
      TVDB_PIN: ""
      TVDB_CACHE_EXPIRATION_DAYS: "7"

      # IMDb - no API key; set to the container path of the dataset folder.
      # Download title.basics.tsv.gz from https://datasets.imdbws.com/ and unpack it,
      # then mount the folder below and set this to the container path (/metadata/imdb).
      IMDB_DATASET_PATH: ""
      IMDB_CACHE_EXPIRATION_DAYS: "7"

    volumes:
      # Application data: settings, SQLite databases, provider cache, Web UI files.
      - dacollector-data:/home/dacollector/.dacollector

      # Logs: bind-mounted to ./logs/ on the host so you can tail them directly.
      - ./logs:/home/dacollector/.dacollector/DaCollector/logs

      # Add your library paths here, then add the container paths as Managed Folders
      # inside DaCollector (Settings > Managed Folders).
      # Keep :ro unless you want DaCollector to delete duplicate files in that folder.
      # - "/mnt/media/movies:/media/movies:ro"
      # - "/mnt/media/tv:/media/tv:ro"

      # IMDb dataset.
      # Needed only for IMDb builders. Set IMDB_DATASET_PATH above to the
      # container path (/metadata/imdb), then uncomment this line.
      # - "/mnt/media/imdb:/metadata/imdb:ro"

    # Required for host.docker.internal to resolve on Linux Docker hosts.
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  dacollector-data:
