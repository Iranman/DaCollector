# DaCollector - Plex collection and duplicate manager
#
# QUICK START
#   1. Edit the environment values in this file.
#   2. Uncomment the media volume lines below and set your real host paths.
#   3. docker compose -f docker-compose.yml pull && docker compose -f docker-compose.yml up -d
#   4. Open http://<server-ip>:38111/webui
#
# NOTE: This file runs the prebuilt self-contained image. The WebUI is already
# included in ghcr.io/iranman/dacollector:latest, so a normal install does not
# need the DaCollector-WebUI repo or a separate WebUI container.
#
# Logs appear in ./logs/ next to this file as the server runs.

services:
  dacollector:
    image: "ghcr.io/iranman/dacollector:latest"
    container_name: dacollector
    restart: unless-stopped

    ports:
      - "38111:38111"

    environment:
      # Set PUID/PGID to the owner of your media folders. On Linux/TrueNAS, run: id <user>
      PUID: "1000"
      PGID: "1000"
      UMASK: "002"
      TZ: "Etc/UTC"
      DACOLLECTOR_HOME: /home/dacollector/.dacollector/DaCollector

      # Set to "true" on TrueNAS/ZFS or ACL-managed datasets only if permissions are already correct.
      SKIP_CHOWN: "false"

      # Plex. Use a LAN IP if Plex is not on the Docker host.
      PLEX_TARGET_BASE_URL: "http://host.docker.internal:32400"
      PLEX_TARGET_SECTION_KEY: ""
      PLEX_TARGET_TOKEN: ""

      # Metadata providers. Leave TVDB blank to disable it for now.
      TMDB_API_KEY: ""
      TVDB_API_KEY: ""
      TVDB_PIN: ""
      TVDB_CACHE_EXPIRATION_DAYS: "7"

    volumes:
      # Application data: settings, SQLite databases, provider cache, Web UI files.
      - dacollector-data:/home/dacollector/.dacollector

      # Logs: written to ./logs/ on the host so you can tail them without docker exec.
      - ./logs:/home/dacollector/.dacollector/DaCollector/logs

      # Uncomment and add your library paths, then register them inside DaCollector
      # at Settings > Managed Folders.
      # Keep :ro unless you want DaCollector to delete duplicate files from that path.
      # - "/mnt/media/movies:/media/movies:ro"
      # - "/mnt/media/tv:/media/tv:ro"

    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  dacollector-data:
