services:
  dacollector:
    image: ghcr.io/iranman/dacollector:latest
    shm_size: 256m
    container_name: dacollector
    restart: unless-stopped
    ports:
      - "38111:38111"
    environment:
      PUID: "1000"
      PGID: "1000"
      UMASK: "002"
      TZ: Etc/UTC
      DACOLLECTOR_HOME: /home/dacollector/.dacollector/DaCollector
      # Set SKIP_CHOWN=true on TrueNAS/ZFS or ACL-managed datasets to skip recursive chown on startup.
      SKIP_CHOWN: "false"
      PLEX_TARGET_BASE_URL: http://host.docker.internal:32400
      PLEX_TARGET_SECTION_KEY: ""
      PLEX_TARGET_TOKEN: ""
      TMDB_API_KEY: ""
      IMDB_DATASET_PATH: ""
      IMDB_CACHE_EXPIRATION_DAYS: "7"
      TVDB_API_KEY: ""
      TVDB_PIN: ""
      TVDB_CACHE_EXPIRATION_DAYS: "7"
    volumes:
      - dacollector-data:/home/dacollector/.dacollector
      # Add your media folders here, then add the container paths as managed folders in DaCollector.
      # - "D:/Media/Movies:/media/movies:ro"
      # - "D:/Media/TV:/media/tv:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  dacollector-data:
