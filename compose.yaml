services:
  dacollector:
    image: dacollector:local
    build:
      context: .
      dockerfile: "${DACOLLECTOR_DOCKERFILE:-Dockerfile.combined}"
      args:
        WEBUI_REPO: "${DACOLLECTOR_WEBUI_REPO:-https://github.com/Iranman/DaCollector-WebUI.git}"
        WEBUI_REF: "${DACOLLECTOR_WEBUI_REF:-main}"
        version: "${DACOLLECTOR_BUILD_VERSION:-0.0.1-local}"
        channel: "${DACOLLECTOR_BUILD_CHANNEL:-local}"
        commit: "${DACOLLECTOR_BUILD_COMMIT:-local}"
        tag: "${DACOLLECTOR_BUILD_TAG:-local}"
        date: "${DACOLLECTOR_BUILD_DATE:-local}"
    container_name: dacollector
    restart: unless-stopped
    ports:
      - "${DACOLLECTOR_PORT:-38111}:38111"
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      UMASK: "${UMASK:-002}"
      TZ: "${TZ:-Etc/UTC}"
      DACOLLECTOR_HOME: /home/dacollector/.dacollector/DaCollector
      # Leave unset for auto-detection (ZFS/NFS skipped automatically).
      # Override: SKIP_CHOWN=true (force skip) or SKIP_CHOWN=false (force chown).
      SKIP_CHOWN: "${SKIP_CHOWN:-}"
      PLEX_TARGET_BASE_URL: "${PLEX_TARGET_BASE_URL:-http://host.docker.internal:32400}"
      PLEX_TARGET_SECTION_KEY: "${PLEX_TARGET_SECTION_KEY:-}"
      PLEX_TARGET_TOKEN: "${PLEX_TARGET_TOKEN:-}"
      TMDB_API_KEY: "${TMDB_API_KEY:-}"
      TVDB_API_KEY: "${TVDB_API_KEY:-}"
      TVDB_PIN: "${TVDB_PIN:-}"
      TVDB_CACHE_EXPIRATION_DAYS: "${TVDB_CACHE_EXPIRATION_DAYS:-7}"
    volumes:
      - dacollector-data:/home/dacollector/.dacollector
      # Add your media folders here, then add the container paths as managed folders in DaCollector.
      # - "D:/Media/Movies:/media/movies:ro"
      # - "D:/Media/TV:/media/tv:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  dacollector-data:
